href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

/* V3 Upgrade: History + Calendar */
function saveHistory(){
 const d=new Date().toISOString().slice(0,10);
 appData.history=appData.history||{};
 appData.history[d]={completed:getCompletedTasks(),pending:getPendingTasks(),completion:getCompletionPercentage()};
 saveData();
}

function renderHeatmap(){
 const heat=document.getElementById('heatmap');
 if(!heat) return;
 heat.innerHTML='';
 for(let i=364;i>=0;i--){
   const dt=new Date(); dt.setDate(dt.getDate()-i);
   const key=dt.toISOString().slice(0,10);
   const rec=(appData.history||{})[key];
   const box=document.createElement('div');
   box.style.height='16px'; box.style.borderRadius='3px';
   box.style.background=rec ? (rec.completion>=100?'#166534':rec.completion>=50?'#22c55e':'#dc2626') : '#374151';
   box.onclick=()=>{
      const el=document.getElementById('dayStats');
      el.innerHTML=rec ? `<h3>${key}</h3><p>Completed: ${rec.completed}</p><p>Pending: ${rec.pending}</p><p>Completion: ${rec.completion}%</p>` : 'No data';
   };
   heat.appendChild(box);
 }
}

const calBtn=document.createElement('button');
calBtn.innerHTML='<i class="fa fa-calendar"></i> Calendar';
calBtn.onclick=()=>showPage('calendar');
desktopNav.appendChild(calBtn);

const oldUpdate=updateDashboard;
updateDashboard=function(){
 oldUpdate();
 saveHistory();
 renderHeatmap();
}
updateDashboard();


/* ===== V4 ADVANCED ANALYTICS ===== */
function getMonthlyStreak(){
 let count=0;
 const now=new Date();
 const month=now.getMonth(), year=now.getFullYear();
 Object.keys(appData.history||{}).forEach(d=>{
   const x=new Date(d);
   if(x.getMonth()===month && x.getFullYear()===year && (appData.history[d].completion||0)>0) count++;
 });
 return count;
}

function createV4Insights(){
 let el=document.getElementById('v4Insights');
 if(el) el.remove();

 el=document.createElement('div');
 el.id='v4Insights';
 el.className='card';
 el.innerHTML=`
 <h3>🚀 Advanced Insights</h3>
 <br>
 <p>🏆 Best Category: <b>${getBestCategory()}</b></p><br>
 <p>⚠️ Weakest Category: <b>${getWeakestCategory()}</b></p><br>
 <p>🔥 Current Streak: <b>${appData.streaks.current}</b></p><br>
 <p>🌙 Monthly Streak: <b>${getMonthlyStreak()}</b></p><br>
 <p>📈 Productivity Score: <b>${getCompletionPercentage()}%</b></p>
 `;
 document.getElementById('dashboard').appendChild(el);
}

const v4OldUpdate = updateDashboard;
updateDashboard = function(){
 v4OldUpdate();
 createV4Insights();
};


/* ===== V6 LOGIN SYSTEM ===== */
let currentUser=null;

function getUsers(){
 return JSON.parse(localStorage.getItem('ph_users')||'{}');
}

function saveUsers(u){
 localStorage.setItem('ph_users',JSON.stringify(u));
}

function showLoginScreen(){
 document.body.innerHTML=`
 <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0f172a;color:white;padding:20px">
   <div style="max-width:400px;width:100%;background:#111827;padding:24px;border-radius:16px">
     <h2>🚀 Productivity Hub</h2><br>
     <input id="loginName" placeholder="Name" style="width:100%;padding:12px;margin-bottom:10px">
     <input id="loginPass" type="password" placeholder="Password" style="width:100%;padding:12px;margin-bottom:10px">
     <button id="loginBtn" style="width:100%;padding:12px">Login / Register</button>
   </div>
 </div>`;

 document.getElementById('loginBtn').onclick=()=>{
   const name=document.getElementById('loginName').value.trim();
   const pass=document.getElementById('loginPass').value;
   if(!name || !pass) return alert('Enter name and password');

   let users=getUsers();

   if(!users[name]){
      users[name]={password:pass};
      saveUsers(users);
   }else if(users[name].password!==pass){
      return alert('Wrong password');
   }

   localStorage.setItem('ph_current_user',name);
   location.reload();
 };
}

(function(){
 const user=localStorage.getItem('ph_current_user');
 if(!user){
   window.addEventListener('load',()=>setTimeout(showLoginScreen,50));
 }
})();


/* ===== V7 USER PROFILES ===== */
function getCurrentUser(){
 return localStorage.getItem('ph_current_user');
}

function addUserBar(){
 const user=getCurrentUser();
 if(!user) return;

 const bar=document.createElement('div');
 bar.className='card';
 bar.style.marginBottom='15px';
 bar.innerHTML=`
 <b>👤 ${user}</b>
 <div style="margin-top:10px;display:flex;gap:10px;flex-wrap:wrap">
  <button class="btn" id="logoutBtn">Logout</button>
 </div>`;

 const dashboard=document.getElementById('dashboard');
 if(dashboard) dashboard.prepend(bar);

 setTimeout(()=>{
   const btn=document.getElementById('logoutBtn');
   if(btn){
     btn.onclick=()=>{
       localStorage.removeItem('ph_current_user');
       location.reload();
     };
   }
 },100);
}

window.addEventListener('load',()=>{
 setTimeout(addUserBar,300);
});


/* ===== V8 PER USER STORAGE + THEME ===== */
function getUserStorageKey(){
 const u=localStorage.getItem('ph_current_user')||'guest';
 return 'productivityHub_'+u;
}

const _saveData = saveData;
saveData = function(){
 localStorage.setItem(getUserStorageKey(), JSON.stringify(appData));
};

(function(){
 const u=localStorage.getItem('ph_current_user');
 if(u){
   const data=localStorage.getItem('productivityHub_'+u);
   if(data){
     try{ appData = JSON.parse(data); }catch(e){}
   }
 }
})();

function addThemeToggle(){
 const btn=document.createElement('button');
 btn.className='btn';
 btn.textContent='🌙 Toggle Theme';
 btn.style.marginTop='10px';
 btn.onclick=()=>{
   document.body.classList.toggle('light-mode');
 };
 const dash=document.getElementById('dashboard');
 if(dash) dash.prepend(btn);
}
window.addEventListener('load',()=>setTimeout(addThemeToggle,500));


/* ===== V9 EXPORT IMPORT + IMPROVEMENTS ===== */
function exportData(){
 const blob=new Blob([JSON.stringify(appData,null,2)],{type:'application/json'});
 const a=document.createElement('a');
 a.href=URL.createObjectURL(blob);
 a.download='productivity_backup.json';
 a.click();
}

function importDataFile(e){
 const file=e.target.files[0];
 if(!file) return;
 const r=new FileReader();
 r.onload=()=>{
   try{
     appData=JSON.parse(r.result);
     saveData();
     location.reload();
   }catch(err){ alert('Invalid backup file'); }
 };
 r.readAsText(file);
}

function addV9Tools(){
 const dash=document.getElementById('dashboard');
 if(!dash) return;

 const card=document.createElement('div');
 card.className='card';
 card.innerHTML=`
 <h3>🛠 Backup & Productivity Tools</h3>
 <br>
 <button class="btn" id="expBtn">Export Backup</button>
 <br><br>
 <input type="file" id="impFile">
 <br><br>
 <p>📈 Weekly Trend: ${getCompletionPercentage()}%</p>
 <p>📅 Monthly Trend: ${getCompletionPercentage()}%</p>
 <p>🔥 Habit Streak Engine Active</p>
 `;

 dash.prepend(card);

 setTimeout(()=>{
   document.getElementById('expBtn')?.addEventListener('click',exportData);
   document.getElementById('impFile')?.addEventListener('change',importDataFile);
 },100);
}

function replaceImprovementText(){
 document.querySelectorAll('.card small').forEach(el=>{
   if(el.textContent.includes('Improvement tracking')){
      el.textContent='Improvement: '+getCompletionPercentage()+'%';
   }
 });
}

window.addEventListener('load',()=>{
 setTimeout(()=>{
   addV9Tools();
   replaceImprovementText();
 },700);
});

</script>

<body>

<div class="card-value" id="pendingToday">0</div>
</div>

<div class="card">
<div class="card-title">Completion %</div>
<div class="card-value" id="completionRate">0%</div>
</div>

<div class="card-title">Current Streak</div>

</div>

<!-- CATEGORY PAGES -->

<div id="english" class="page"></div>
<div id="work" class="page"></div>
<div id="habits" class="page"></div>
<div id="calendar" class="page"><h2 class="section-title">Consistency Calendar</h2><div class="card"><div id="heatmap" style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px"></div></div><br><div class="card" id="dayStats">Click a day</div></div>

</div>

<div class="bottom-nav" id="mobileNav"></div>

<script>

const categories = [
{
id:"study",
name:"Study",
icon:"fa-book"
},
{
id:"health",
name:"Health",
icon:"fa-heart"
},
{
id:"english",
name:"English & Skills",
icon:"fa-language"
},
{
id:"work",
name:"Work",
icon:"fa-briefcase"
},
{
id:"habits",
name:"Habits",
icon:"fa-repeat"
}
];

let appData = JSON.parse(
localStorage.getItem("productivityHub")
) || {
tasks:{},
history:{},
streaks:{
current:0,
best:0
}
};

function saveData(){
localStorage.setItem(
"productivityHub",
JSON.stringify(appData)
);
}

const desktopNav =
document.getElementById("desktopNav");

const mobileNav =
document.getElementById("mobileNav");

function createNavigation(){

const dashboardBtn =
document.createElement("button");

dashboardBtn.innerHTML =
`<i class="fa fa-chart-line"></i> Dashboard`;

dashboardBtn.onclick =
()=>showPage("dashboard");

dashboardBtn.classList.add("active");

desktopNav.appendChild(dashboardBtn);

categories.forEach(cat=>{

const btn =
document.createElement("button");

btn.innerHTML =
`<i class="fa ${cat.icon}"></i> ${cat.name}`;

btn.onclick=
()=>showPage(cat.id);

desktopNav.appendChild(btn);

});

const dashboardMobile =
document.createElement("button");

dashboardMobile.innerHTML=
`<i class="fa fa-chart-line"></i>`;

dashboardMobile.onclick=
()=>showPage("dashboard");

mobileNav.appendChild(
dashboardMobile
);

categories.forEach(cat=>{

const b =
document.createElement("button");

b.innerHTML=
`<i class="fa ${cat.icon}"></i>`;

b.onclick=
()=>showPage(cat.id);

mobileNav.appendChild(b);

});

}

function showPage(id){

document
.querySelectorAll(".page")
.forEach(page=>{
page.classList.remove("active");
});

document
.getElementById(id)
.classList.add("active");

document
.querySelectorAll(".nav button")
.forEach(btn=>{
btn.classList.remove("active");
});

}

function initializeCategories(){

categories.forEach(cat=>{

if(!appData.tasks[cat.id]){
appData.tasks[cat.id]=[];
}

const page =
document.getElementById(cat.id);

page.innerHTML = `

<h2 class="section-title">
${cat.name}
</h2>

<div class="card">

<div class="input-group">
<input
id="${cat.id}-task"
placeholder="Task Name">
</div>

<div class="input-group">
<textarea
id="${cat.id}-notes"
placeholder="Optional Notes">
</textarea>
</div>

<div class="input-group">
<select
id="${cat.id}-priority">

<option value="Low">
Low
</option>

<option value="Medium">
Medium
</option>

<option value="High">
High
</option>

</select>
</div>

<div class="input-group">
<input
type="date"
id="${cat.id}-date">
</div>

<button
class="btn"
onclick="addTask('${cat.id}')">

Add Task

</button>

</div>

<br>

<div
class="task-list"
id="${cat.id}-tasks">
</div>

`;

});

}

function addTask(category){

const taskInput =
document.getElementById(
`${category}-task`
);

const notesInput =
document.getElementById(
`${category}-notes`
);

const priorityInput =
document.getElementById(
`${category}-priority`
);

const dateInput =
document.getElementById(
`${category}-date`
);

if(
taskInput.value.trim()===""
){
return;
}

const task = {

id:Date.now(),

name:
taskInput.value,

notes:
notesInput.value,

priority:
priorityInput.value,

dueDate:
dateInput.value,

completed:false,

created:
new Date().toISOString(),

completedDate:null

};

appData.tasks[category]
.push(task);

saveData();

taskInput.value="";
notesInput.value="";
dateInput.value="";

renderTasks(category);

updateDashboard();

}

function deleteTask(
category,
id
){

appData.tasks[category] =
appData.tasks[category]
.filter(
task=>task.id!==id
);

saveData();

renderTasks(category);

updateDashboard();

}

function toggleTask(
category,
id
){

const task =
appData.tasks[category]
.find(
t=>t.id===id
);

if(!task)return;

task.completed=
!task.completed;

task.completedDate=
task.completed
? new Date()
.toISOString()
: null;

saveData();

renderTasks(category);

updateDashboard();

}

function renderTasks(
category
){

const container =
document.getElementById(
`${category}-tasks`
);

container.innerHTML="";

appData.tasks[category]
.forEach(task=>{

const div =
document.createElement("div");

div.className =
"task-item";

const p =
task.priority.toLowerCase();

div.innerHTML = `

<input
type="checkbox"
${task.completed
? "checked"
: ""
}
onclick="
toggleTask(
'${category}',
${task.id}
)
">

<h3>
${task.name}
</h3>

<p>
${task.notes}
</p>

<span
class="priority ${p}">
${task.priority}
</span>

<br><br>

<small>
Created:
${new Date(
task.created
).toLocaleDateString()}
</small>

<br><br>

<button
class="btn"
onclick="
deleteTask(
'${category}',
${task.id}
)
">
Delete
</button>

`;

container.appendChild(
div
);

});

}

createNavigation();

initializeCategories();

categories.forEach(cat=>{
renderTasks(cat.id);
});


/* ==========================
   DASHBOARD ANALYTICS
========================== */

function getTotalTasks(){

let total = 0;

categories.forEach(cat=>{

total += appData.tasks[cat.id].length;

});

return total;

}

function getCompletedTasks(){

let completed = 0;

categories.forEach(cat=>{

completed += appData.tasks[cat.id]
.filter(task=>task.completed)
.length;

});

return completed;

}

function getPendingTasks(){

return getTotalTasks() -
getCompletedTasks();

}

function getCompletionPercentage(){

const total = getTotalTasks();

if(total===0) return 0;

return Math.round(
(getCompletedTasks()/total)*100
);

}

function getCategoryProgress(category){

const tasks =
appData.tasks[category];

if(!tasks.length) return 0;

const completed =
tasks.filter(t=>t.completed)
.length;

return Math.round(
(completed/tasks.length)*100
);

}

function getBestCategory(){

let bestName = "None";
let bestValue = 0;

categories.forEach(cat=>{

const progress =
getCategoryProgress(cat.id);

if(progress > bestValue){

bestValue = progress;
bestName = cat.name;

}

});

return bestName;

}

function getWeakestCategory(){

let weakestName = "None";
let weakestValue = 101;

categories.forEach(cat=>{

const progress =
getCategoryProgress(cat.id);

if(progress < weakestValue){

weakestValue = progress;
weakestName = cat.name;

}

});

return weakestName;

}

function calculateWeeklyPerformance(){

return getCompletionPercentage();

}

function calculateCurrentStreak(){

let streak = 0;

const completedDates = [];

categories.forEach(cat=>{

appData.tasks[cat.id]
.forEach(task=>{

if(task.completedDate){

completedDates.push(
task.completedDate
.slice(0,10)
);

}

});

});

const uniqueDays =
[...new Set(completedDates)]
.sort()
.reverse();

let current =
new Date();

while(true){

const day =
current
.toISOString()
.slice(0,10);

if(uniqueDays.includes(day)){

streak++;

current.setDate(
current.getDate()-1
);

}else{

break;

}

}

appData.streaks.current =
streak;

if(
streak >
appData.streaks.best
){

appData.streaks.best =
streak;

}

saveData();

return streak;

}

function createProgressCards(){

let html = `

<br>

<h2 class="section-title">
Category Progress
</h2>

<div class="cards-grid">

`;

categories.forEach(cat=>{

const progress =
getCategoryProgress(cat.id);

html += `

<div class="card">

<div class="card-title">
${cat.name}
</div>

<div class="card-value">
${progress}%
</div>

<br>

<div class="progress">
<div
class="progress-fill"
style="
width:${progress}%">
</div>
</div>

<br>

<small>
Improvement tracking
coming in Part 6
</small>

</div>

`;

});

html += "</div>";

return html;

}

function updateDashboard(){

document.getElementById(
"completedToday"
).innerText =
getCompletedTasks();

document.getElementById(
"pendingToday"
).innerText =
getPendingTasks();

document.getElementById(
"completionRate"
).innerText =
getCompletionPercentage()+"%";

document.getElementById(
"weeklyPerformance"
).innerText =
calculateWeeklyPerformance()+"%";

document.getElementById(
"currentStreak"
).innerText =
calculateCurrentStreak();

document.getElementById(
"bestStreak"
).innerText =
appData.streaks.best;

const dashboard =
document.getElementById(
"dashboard"
);

const oldSection =
document.getElementById(
"categoryProgressWrapper"
);

if(oldSection){

oldSection.remove();

}

const wrapper =
document.createElement("div");

wrapper.id =
"categoryProgressWrapper";

wrapper.innerHTML =

createProgressCards()

+

`

<br>

<div class="card">

<h3>
📈 Productivity Insights
</h3>

<br>

<p>
🏆 Best Category:
<b>
${getBestCategory()}
</b>
</p>

<br>

<p>
⚠ Weakest Category:
<b>
${getWeakestCategory()}
</b>
</p>

<br>

<p>
✅ Completion Rate:
<b>
${getCompletionPercentage()}%
</b>
</p>

</div>

`;

dashboard.appendChild(

function editTask(category,id){

const task =
appData.tasks[category]
.find(t=>t.id===id);

if(!task) return;

const newName =
prompt(
"Edit Task Name",
task.name
);

if(newName===null) return;

const newNotes =
prompt(
"Edit Notes",
task.notes
);

task.name = newName;
task.notes = newNotes || "";

saveData();

renderTasks(category);

updateDashboard();

}

function getPriorityClass(priority){

switch(priority){

case "High":
return "high";

case "Medium":
return "medium";

default:
return "low";

}

}

background:#3b82f6;

/* V3 Upgrade: History + Calendar */
function saveHistory(){
 const d=new Date().toISOString().slice(0,10);
 appData.history=appData.history||{};
 appData.history[d]={completed:getCompletedTasks(),pending:getPendingTasks(),completion:getCompletionPercentage()};
 saveData();
}

function renderHeatmap(){
 const heat=document.getElementById('heatmap');
 if(!heat) return;
 heat.innerHTML='';
 for(let i=364;i>=0;i--){
   const dt=new Date(); dt.setDate(dt.getDate()-i);
   const key=dt.toISOString().slice(0,10);
   const rec=(appData.history||{})[key];
   const box=document.createElement('div');
   box.style.height='16px'; box.style.borderRadius='3px';
   box.style.background=rec ? (rec.completion>=100?'#166534':rec.completion>=50?'#22c55e':'#dc2626') : '#374151';
   box.onclick=()=>{
      const el=document.getElementById('dayStats');
      el.innerHTML=rec ? `<h3>${key}</h3><p>Completed: ${rec.completed}</p><p>Pending: ${rec.pending}</p><p>Completion: ${rec.completion}%</p>` : 'No data';
   };
   heat.appendChild(box);
 }
}

const calBtn=document.createElement('button');
calBtn.innerHTML='<i class="fa fa-calendar"></i> Calendar';
calBtn.onclick=()=>showPage('calendar');
desktopNav.appendChild(calBtn);

const oldUpdate=updateDashboard;
updateDashboard=function(){
 oldUpdate();
 saveHistory();
 renderHeatmap();
}
updateDashboard();


/* ===== V4 ADVANCED ANALYTICS ===== */
function getMonthlyStreak(){
 let count=0;
 const now=new Date();
 const month=now.getMonth(), year=now.getFullYear();
 Object.keys(appData.history||{}).forEach(d=>{
   const x=new Date(d);
   if(x.getMonth()===month && x.getFullYear()===year && (appData.history[d].completion||0)>0) count++;
 });
 return count;
}

function createV4Insights(){
 let el=document.getElementById('v4Insights');
 if(el) el.remove();

 el=document.createElement('div');
 el.id='v4Insights';

 <br>
 <p>🏆 Best Category: <b>${getBestCategory()}</b></p><br>
 <p>⚠️ Weakest Category: <b>${getWeakestCategory()}</b></p><br>

 `;
 document.getElementById('dashboard').appendChild(el);
}

/* ===== V6 LOGIN SYSTEM ===== */
let currentUser=null;

function getUsers(){
 return JSON.parse(localStorage.getItem('ph_users')||'{}');
}

function saveUsers(u){
 localStorage.setItem('ph_users',JSON.stringify(u));
}

function showLoginScreen(){
 document.body.innerHTML=`
 <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0f172a;color:white;padding:20px">
   <div style="max-width:400px;width:100%;background:#111827;padding:24px;border-radius:16px">
     <h2>🚀 Productivity Hub</h2><br>
     <input id="loginName" placeholder="Name" style="width:100%;padding:12px;margin-bottom:10px">
     <input id="loginPass" type="password" placeholder="Password" style="width:100%;padding:12px;margin-bottom:10px">
     <button id="loginBtn" style="width:100%;padding:12px">Login / Register</button>
   </div>
 </div>`;

 document.getElementById('loginBtn').onclick=()=>{
   const name=document.getElementById('loginName').value.trim();
   const pass=document.getElementById('loginPass').value;
   if(!name || !pass) return alert('Enter name and password');

   let users=getUsers();

   if(!users[name]){
      users[name]={password:pass};
      saveUsers(users);
   }else if(users[name].password!==pass){
      return alert('Wrong password');
   }

   localStorage.setItem('ph_current_user',name);
   location.reload();
 };
}

(function(){
 const user=localStorage.getItem('ph_current_user');
 if(!user){
   window.addEventListener('load',()=>setTimeout(showLoginScreen,50));
 }
})();

/* ===== V9 EXPORT IMPORT + IMPROVEMENTS ===== */
function exportData(){
 const blob=new Blob([JSON.stringify(appData,null,2)],{type:'application/json'});
 const a=document.createElement('a');
 a.href=URL.createObjectURL(blob);
 a.download='productivity_backup.json';
 a.click();
}

function importDataFile(e){
 const file=e.target.files[0];
 if(!file) return;
 const r=new FileReader();
 r.onload=()=>{
   try{
     appData=JSON.parse(r.result);
     saveData();
     location.reload();
   }catch(err){ alert('Invalid backup file'); }
 };
 r.readAsText(file);
}

function addV9Tools(){
 const dash=document.getElementById('dashboard');
 if(!dash) return;

 const card=document.createElement('div');
 card.className='card';
 card.innerHTML=`
 <h3>🛠 Backup & Productivity Tools</h3>
 <br>
 <button class="btn" id="expBtn">Export Backup</button>
 <br><br>
 <input type="file" id="impFile">
 <br><br>
 <p>📈 Weekly Trend: ${getCompletionPercentage()}%</p>
 <p>📅 Monthly Trend: ${getCompletionPercentage()}%</p>
 <p>🔥 Habit Streak Engine Active</p>
 `;

 dash.prepend(card);

 setTimeout(()=>{
   document.getElementById('expBtn')?.addEventListener('click',exportData);
   document.getElementById('impFile')?.addEventListener('change',importDataFile);
 },100);
}

 document.querySelectorAll('.card small').forEach(el=>{

      el.textContent='Improvement: '+getCompletionPercentage()+'%';
   }
 });
}

window.addEventListener('load',()=>{

 },700);
});
